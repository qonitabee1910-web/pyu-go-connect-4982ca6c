<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PYU GO — Rides &amp; Shuttle</title>
    <meta name="description" content="PYU GO - Your super app for on-demand rides and shuttle booking">
    <meta name="author" content="PYU GO" />
    <link rel="icon" type="image/png" href="/pyu_go_icon.png">
    <link rel="apple-touch-icon" href="/pyu_go_icon.png" />
    <meta name="theme-color" content="#1a9e5c" />
    
    <!-- Preload critical resources - improves FCP by ~150-200ms -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="modulepreload" href="/src/main.tsx">
    
    <!-- DNS prefetch for Supabase & external APIs -->
    <link rel="dns-prefetch" href="https://supabase.co">
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org">
    <link rel="dns-prefetch" href="https://api.openrouteservice.org">
    
    <!-- Performance optimization: critical inline styles -->
    <style>
      /* Font loading optimization - system fonts first */
      @font-face {
        font-family: 'Plus Jakarta Sans';
        src: local('Plus Jakarta Sans');
        font-display: swap;
      }
      
      /* Prevent layout shift (CLS) during font load */
      body { 
        margin: 0; 
        padding: 0;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #fafbfc;
        color: #1a1d1e;
        font-size: 16px;
        line-height: 1.5;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Prevent layout shift */
      * {
        box-sizing: border-box;
      }
      
      /* Splash/Loading animation */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
      }
      
      .app-loading svg {
        animation: spin 1s linear infinite;
      }
    </style>
